<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MNIST // antoineritter.fr</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
:root {
  --green-hi:       #86efac;
  --green:          #4ade80;
  --green-mid:      #22c55e;
  --green-dim:      #16a34a;
  --green-deep:     #0f3d25;
  --green-glow:     rgba(74,222,128,0.12);
  --green-glow-soft:rgba(74,222,128,0.05);
  --amber: #fbbf24;
  --red:   #f87171;
  --bg:    #0d1117;
  --bg2:   #161b22;
  --bg3:   #1c2128;
  --bg4:   #22272e;
  --border:        #21262d;
  --border-mid:    rgba(74,222,128,0.15);
  --border-bright: rgba(74,222,128,0.30);
  --text:       #e2e8f0;
  --text-dim:   #94a3b8;
  --text-muted: #64748b;
  --text-faint: #374151;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  min-height: 100vh;
  overflow-x: hidden;
}
@keyframes blink  { 0%,100%{opacity:1} 50%{opacity:0} }
@keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
@keyframes spin   { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

.cursor {
  display: inline-block;
  width: 8px; height: 14px;
  background: var(--green);
  animation: blink 1.1s step-end infinite;
  vertical-align: middle;
  margin-left: 2px;
}

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: #30363d; border-radius: 2px; }

#root { max-width: 1000px; margin: 0 auto; padding: 32px 24px 80px; }

/* ── Header ── */
.header {
  border: 1px solid var(--border);
  padding: 20px 24px;
  margin-bottom: 24px;
  background: var(--bg2);
  position: relative;
  overflow: hidden;
}
.header::before {
  content:'';
  position:absolute; top:0; left:0; right:0; height:1px;
  background: linear-gradient(90deg, transparent, var(--green), transparent);
}
.header-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
.header-title { font-size:22px; font-weight:700; letter-spacing:0.2em; text-transform:uppercase; color:var(--green); }
.header-sub { color:var(--text-muted); font-size:11px; letter-spacing:0.1em; margin-top:4px; }
.clock { font-size:11px; color:var(--text-faint); letter-spacing:0.08em; }
.stats-row { display:flex; gap:32px; padding-top:12px; border-top:1px solid var(--border); flex-wrap:wrap; }
.stat-item { display:flex; flex-direction:column; gap:2px; }
.stat-val { font-size:20px; font-weight:700; color:var(--green); }
.stat-lbl { font-size:10px; color:var(--text-faint); letter-spacing:0.1em; text-transform:uppercase; }

/* ── Main grid ── */
.main-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px; }
@media (max-width: 680px) { .main-grid { grid-template-columns: 1fr; } }

/* ── Panel ── */
.panel { border:1px solid var(--border); background:var(--bg2); }
.panel-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:10px 16px; border-bottom:1px solid var(--border);
  font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:var(--text-faint);
}
.panel-header span { color:var(--green-mid); font-weight:500; }
.panel-body { padding: 16px; }

/* ── Canvas ── */
.canvas-wrap { display:flex; flex-direction:column; align-items:center; gap:12px; }
.canvas-zone { border:1px solid var(--border-bright); cursor:crosshair; display:block; }
.canvas-zone:hover { border-color:var(--green); }
canvas { display:block; }

/* ── Buttons ── */
.btn-row { display:flex; gap:8px; width:100%; }
.btn {
  flex:1; display:inline-flex; align-items:center; justify-content:center; gap:8px;
  padding:10px 0; border:1px solid var(--border); background:transparent;
  color:var(--text-muted); font-family:'JetBrains Mono',monospace;
  font-size:12px; cursor:pointer; letter-spacing:0.1em; transition:all 0.15s; text-transform:uppercase;
}
.btn:hover { color:var(--green); border-color:var(--border-bright); background:rgba(74,222,128,0.04); }
.btn.primary { color:var(--bg); background:var(--green); border-color:var(--green); font-weight:700; }
.btn.primary:hover { background:#86efac; border-color:#86efac; }
.btn.primary:disabled { opacity:0.35; cursor:not-allowed; }
.btn.loading .spin { animation:spin 0.8s linear infinite; display:inline-block; }

/* ── Confidence bars ── */
.conf-list { display:flex; flex-direction:column; gap:6px; }
.conf-row { display:flex; align-items:center; gap:10px; }
.conf-digit { width:24px; text-align:right; font-size:14px; font-weight:700; flex-shrink:0; color:var(--text-muted); }
.conf-digit.winner { color:var(--green-hi); }
.conf-bar-bg { flex:1; height:16px; background:var(--bg3); border:1px solid var(--border); position:relative; overflow:hidden; }
.conf-bar-fill { height:100%; background:var(--green-deep); opacity:1; transition:width 0.5s cubic-bezier(0.22,1,0.36,1); }
.conf-bar-fill.winner { background:var(--green-dim); }
.conf-pct { width:42px; text-align:right; font-size:11px; color:var(--text-faint); flex-shrink:0; }
.conf-pct.winner { color:var(--green-mid); }

/* ── Prediction ── */
.pred-display { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; padding:16px 0; }
.pred-digit { font-size:96px; font-weight:700; line-height:1; color:var(--green-hi); }
.pred-label { font-size:10px; letter-spacing:0.15em; text-transform:uppercase; color:var(--text-faint); }
.pred-conf { font-size:22px; font-weight:700; color:var(--amber); }

/* ── Idle ── */
.idle-state {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:8px; padding:20px 0; color:var(--text-muted); font-size:11px; letter-spacing:0.1em;
  text-align:center; line-height:1.8;
}
.idle-big { font-size:48px; opacity:0.08; font-weight:700; color:var(--green); }

/* ── Log ── */
.log-panel { border:1px solid var(--border); background:var(--bg2); }
.log-header {
  padding:10px 16px; border-bottom:1px solid var(--border);
  font-size:10px; letter-spacing:0.12em; text-transform:uppercase;
  display:flex; align-items:center; justify-content:space-between; color:var(--text-muted);
}
.log-body { padding:12px 16px; height:180px; overflow-y:auto; display:flex; flex-direction:column; gap:4px; }
.log-entry { font-size:11px; line-height:1.5; animation:fadeIn 0.2s ease; }
.log-time { color:var(--text-faint); margin-right:8px; }
.log-ok   { color:var(--green-mid); }
.log-warn { color:var(--amber); }
.log-err  { color:var(--red); }
.log-dim  { color:var(--text-muted); }

/* ── Preview ── */
.preview-28 { image-rendering:pixelated; border:1px solid var(--border); opacity:0.7; }

/* ── Tweaks ── */
.tweaks-btn {
  position:fixed; bottom:24px; right:24px;
  background:var(--bg3); border:1px solid var(--border);
  color:var(--text-muted); font-family:'JetBrains Mono',monospace;
  font-size:11px; padding:8px 14px; cursor:pointer; z-index:500; letter-spacing:0.1em;
}
.tweaks-btn:hover { color:var(--green); border-color:var(--border-bright); }
.tweaks-panel {
  position:fixed; bottom:24px; right:24px; width:220px;
  background:var(--bg3); border:1px solid var(--border);
  padding:16px; z-index:500; animation:fadeIn 0.2s ease;
}
.tweaks-title { font-size:11px; letter-spacing:0.15em; text-transform:uppercase; color:var(--green); margin-bottom:14px; border-bottom:1px solid var(--border); padding-bottom:8px; }
.tweak-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; gap:8px; }
.tweak-label { font-size:11px; color:var(--text-dim); }
.tweak-select {
  background:var(--bg2); border:1px solid var(--border);
  color:var(--text); font-family:'JetBrains Mono',monospace;
  font-size:11px; padding:3px 6px; outline:none; cursor:pointer;
}
.tweak-select:focus { border-color:var(--border-bright); }
.toggle-switch {
  width:32px; height:16px; background:var(--bg); border:1px solid var(--border);
  border-radius:8px; cursor:pointer; position:relative; transition:background 0.2s;
}
.toggle-switch.on { background:var(--green-dim); border-color:var(--green); }
.toggle-knob {
  position:absolute; top:2px; left:2px;
  width:10px; height:10px; background:var(--text-muted); border-radius:50%;
  transition:transform 0.2s, background 0.2s;
}
.toggle-switch.on .toggle-knob { transform:translateX(16px); background:var(--green); }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ── Language detection ───────────────────────────────────────────── */
const LANG = navigator.language?.startsWith('fr') ? 'fr' : 'en';

const T = {
  fr: {
    headerSub:     'root@antoineritter.fr ~ reconnaissance de chiffres manuscrits',
    statPreds:     'Prédictions', statLast:'Dernier', statBackend:'Backend',
    modelActive:   'modèle actif',
    panelDraw:     'Saisie',     panelHint:'28×28 px · blanc sur noir',
    panelResult:   'Résultat',
    preview28:     'Aperçu 28×28',
    btnClear:      '✗ Effacer',  btnPredict:'$ ./predict →', btnRunning:'Analyse…',
    idleHint:      'Dessinez un chiffre\npuis lancez l\'analyse',
    detectedLabel: 'Chiffre détecté',
    logInit:       'Système initialisé · MNIST v2.1.0',
    logModel:      'Modèle chargé · backend: cnn-keras',
    logWaiting:    'En attente de saisie…',
    logCleared:    'Canvas effacé',
    logWarnEmpty:  '[WARN] Aucun chiffre à analyser',
    logPredCmd:    '$ ./predict --model=cnn --input=canvas',
    logPredOk:     (digit, pct) => `[OK] Prédiction: ${digit} · confiance: ${pct}%`,
    logPredScores: 'Scores',
    logErrUnknown: 'Erreur inconnue',
    termTitle:     'Terminal',   termEntries: (n) => `${n} entrée${n>1?'s':''}`,
    tweakBrush:    'Taille pinceau', tweakPreview:'Aperçu 28×28',
    tweakSmooth:   'Lissage',    tweakAuto:'Auto-predict',
    brushFine:     'Fin (12px)', brushMed:'Moyen (20px)', brushThick:'Épais (30px)',
  },
  en: {
    headerSub:     'root@antoineritter.fr ~ handwritten digit recognition',
    statPreds:     'Predictions', statLast:'Last', statBackend:'Backend',
    modelActive:   'model active',
    panelDraw:     'Drawing',    panelHint:'28×28 px · white on black',
    panelResult:   'Result',
    preview28:     'Preview 28×28',
    btnClear:      '✗ Clear',    btnPredict:'$ ./predict →', btnRunning:'Running…',
    idleHint:      'Draw a digit\nthen run analysis',
    detectedLabel: 'Detected digit',
    logInit:       'System initialized · MNIST v2.1.0',
    logModel:      'Model loaded · backend: cnn-keras',
    logWaiting:    'Waiting for input…',
    logCleared:    'Canvas cleared',
    logWarnEmpty:  '[WARN] No digit to analyze',
    logPredCmd:    '$ ./predict --model=cnn --input=canvas',
    logPredOk:     (digit, pct) => `[OK] Prediction: ${digit} · confidence: ${pct}%`,
    logPredScores: 'Scores',
    logErrUnknown: 'Unknown error',
    termTitle:     'Terminal',   termEntries: (n) => `${n} entr${n>1?'ies':'y'}`,
    tweakBrush:    'Brush size', tweakPreview:'Preview 28×28',
    tweakSmooth:   'Smoothing',  tweakAuto:'Auto-predict',
    brushFine:     'Fine (12px)', brushMed:'Medium (20px)', brushThick:'Thick (30px)',
  },
};
const t = T[LANG];

const TWEAK_DEFAULTS = {
  brushSize: "medium",
  showPreview28: true,
  smoothing: true,
  autoPredict: false,
};

function Clock() {
  const [time, setTime] = useState(new Date());
  useEffect(() => { const t = setInterval(() => setTime(new Date()), 1000); return () => clearInterval(t); }, []);
  const p = n => String(n).padStart(2,'0');
  return <span className="clock">{time.toLocaleDateString('fr-FR')} {p(time.getHours())}:{p(time.getMinutes())}:{p(time.getSeconds())}</span>;
}

function App() {
  const canvasRef = useRef(null);
  const previewRef = useRef(null);
  const logBodyRef = useRef(null);
  const drawing = useRef(false);
  const lastPos = useRef(null);
  const autoPredictTimer = useRef(null);

  const [confs, setConfs] = useState(null);
  const [prediction, setPrediction] = useState(null);
  const [isLoading, setIsLoading] = useState(false);
  const [isEmpty, setIsEmpty] = useState(true);
  const [log, setLog] = useState([]);
  const [stats, setStats] = useState({ total: 0, lastPred: '—' });
  const [tweaksOpen, setTweaksOpen] = useState(false);
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);

  const addLog = useCallback((msg, type='dim') => {
    const now = new Date();
    const p = n => String(n).padStart(2,'0');
    const ts = `${p(now.getHours())}:${p(now.getMinutes())}:${p(now.getSeconds())}`;
    setLog(l => [...l.slice(-60), { ts, msg, type }]);
    setTimeout(() => {
      if (logBodyRef.current) logBodyRef.current.scrollTop = logBodyRef.current.scrollHeight;
    }, 50);
  }, []);

  useEffect(() => {
    addLog(t.logInit, 'ok');
    addLog(t.logModel, 'dim');
    addLog(t.logWaiting, 'dim');
  }, []);

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, 280, 280);
  }, []);

  const brushSizePx = { small: 12, medium: 20, large: 30 }[tweaks.brushSize] || 20;

  const getPos = (e, canvas) => {
    const rect = canvas.getBoundingClientRect();
    if (e.touches) {
      return { x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top };
    }
    return { x: e.clientX - rect.left, y: e.clientY - rect.top };
  };

  const updatePreview28 = () => {
    const canvas = canvasRef.current;
    const preview = previewRef.current;
    if (!canvas || !preview) return;
    const ctx28 = preview.getContext('2d');
    ctx28.drawImage(canvas, 0, 0, 28, 28);
  };

  const draw = (e) => {
    if (!drawing.current) return;
    e.preventDefault();
    const canvas = canvasRef.current;
    const ctx = canvas.getContext('2d');
    const pos = getPos(e, canvas);

    ctx.strokeStyle = '#fff';
    ctx.lineWidth = brushSizePx;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    if (tweaks.smoothing) ctx.imageSmoothingEnabled = true;

    if (lastPos.current) {
      ctx.beginPath();
      ctx.moveTo(lastPos.current.x, lastPos.current.y);
      ctx.lineTo(pos.x, pos.y);
      ctx.stroke();
    } else {
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, brushSizePx / 2, 0, Math.PI * 2);
      ctx.fillStyle = '#fff';
      ctx.fill();
    }
    lastPos.current = pos;
    setIsEmpty(false);
    updatePreview28();
  };

  const startDraw = (e) => {
    clearTimeout(autoPredictTimer.current);
    drawing.current = true;
    lastPos.current = null;
    draw(e);
  };

  const stopDraw = () => {
    drawing.current = false;
    lastPos.current = null;
    if (tweaks.autoPredict && !isEmpty) {
      autoPredictTimer.current = setTimeout(predict, 1000);
    }
  };

  const clearCanvas = () => {
    clearTimeout(autoPredictTimer.current);
    const canvas = canvasRef.current;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, 280, 280);
    const preview = previewRef.current;
    if (preview) {
      const ctx28 = preview.getContext('2d');
      ctx28.fillStyle = '#000';
      ctx28.fillRect(0, 0, 28, 28);
    }
    setIsEmpty(true);
    setConfs(null);
    setPrediction(null);
    addLog(t.logCleared, 'dim');
  };

  const predict = async () => {
    if (isEmpty) { addLog(t.logWarnEmpty, 'warn'); return; }
    setIsLoading(true);
    addLog(t.logPredCmd, 'dim');

    try {
      const canvas = canvasRef.current;
      const base64 = canvas.toDataURL('image/png');

      const response = await fetch('/predict', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ image: base64 }),
      });

      const data = await response.json();

      if (data.error) {
        addLog(`[ERR] ${data.error}`, 'err');
        setIsLoading(false);
        return;
      }

      const { digit, confidences } = data;
      setConfs(confidences);
      setPrediction(digit);
      setStats(s => ({ total: s.total + 1, lastPred: String(digit) }));

      const pct = (confidences[digit] * 100).toFixed(1);
      addLog(t.logPredOk(digit, pct), 'ok');
      addLog(`     ${t.logPredScores}: [${confidences.map(c => (c*100).toFixed(0)).join(', ')}]`, 'dim');
    } catch (err) {
      addLog(`[ERR] ${err.message || t.logErrUnknown}`, 'err');
    } finally {
      setIsLoading(false);
    }
  };

  function setTweak(key, val) {
    setTweaks(prev => ({ ...prev, [key]: val }));
  }

  return (
    <div>
      {/* Header */}
      <div className="header">
        <div className="header-top">
          <div>
            <div className="header-title">■ MNIST</div>
            <div className="header-sub">{t.headerSub}</div>
          </div>
          <Clock />
        </div>
        <div className="stats-row">
          <div className="stat-item">
            <div className="stat-val">{stats.total}</div>
            <div className="stat-lbl">{t.statPreds}</div>
          </div>
          <div className="stat-item">
            <div className="stat-val">{stats.lastPred}</div>
            <div className="stat-lbl">{t.statLast}</div>
          </div>
          <div className="stat-item">
            <div className="stat-val" style={{color:'var(--amber)'}}>CNN</div>
            <div className="stat-lbl">{t.statBackend}</div>
          </div>
          <div className="stat-item" style={{marginLeft:'auto', alignSelf:'center'}}>
            <div style={{fontSize:'10px', color:'var(--text-muted)', letterSpacing:'0.08em'}}>
              <span style={{color:'var(--green)'}}>●</span> {t.modelActive}
            </div>
          </div>
        </div>
      </div>

      {/* Main grid */}
      <div className="main-grid">
        {/* Left: draw */}
        <div className="panel">
          <div className="panel-header">
            <span>{t.panelDraw}</span>
            <span style={{color:'var(--text-muted)', fontSize:'10px'}}>{t.panelHint}</span>
          </div>
          <div className="panel-body">
            <div className="canvas-wrap">
              <div className="canvas-zone">
                <canvas
                  ref={canvasRef}
                  width={280} height={280}
                  onMouseDown={startDraw}
                  onMouseMove={draw}
                  onMouseUp={stopDraw}
                  onMouseLeave={stopDraw}
                  onTouchStart={startDraw}
                  onTouchMove={draw}
                  onTouchEnd={stopDraw}
                />
              </div>
              {tweaks.showPreview28 && (
                <div style={{display:'flex', alignItems:'center', gap:'10px', fontSize:'10px', color:'var(--text-muted)'}}>
                  <span>{t.preview28}</span>
                  <canvas ref={previewRef} width={28} height={28} className="preview-28" style={{width:56,height:56}} />
                </div>
              )}
              <div className="btn-row">
                <button className="btn" onClick={clearCanvas}>{t.btnClear}</button>
                <button
                  className={`btn primary${isLoading ? ' loading' : ''}`}
                  onClick={predict}
                  disabled={isLoading || isEmpty}
                >
                  {isLoading
                    ? <><span className="spin">↻</span> {t.btnRunning}</>
                    : <>{t.btnPredict}</>
                  }
                </button>
              </div>
            </div>
          </div>
        </div>

        {/* Right: results */}
        <div className="panel">
          <div className="panel-header">
            <span>{t.panelResult}</span>
            {prediction !== null && <span style={{color:'var(--amber)'}}>DIGIT_{prediction}</span>}
          </div>
          <div className="panel-body">
            {prediction === null ? (
              <div className="idle-state">
                <div className="idle-big">?</div>
                <div>{t.idleHint.split('\n').map((line,i) => <span key={i}>{line}{i===0&&<br/>}</span>)}</div>
                <div style={{color:'var(--border-bright)', fontSize:'10px', marginTop:'4px'}}>0 → 9</div>
              </div>
            ) : (
              <div className="pred-display">
                <div className="pred-label">{t.detectedLabel}</div>
                <div className="pred-digit">{prediction}</div>
                <div className="pred-conf">{confs ? (confs[prediction]*100).toFixed(1) : '—'}%</div>
              </div>
            )}

            {/* Confidence bars */}
            <div className="conf-list" style={{marginTop: prediction !== null ? '12px' : 0}}>
              {(confs || Array(10).fill(0)).map((c, i) => {
                const isWinner = prediction === i;
                return (
                  <div key={i} className="conf-row">
                    <div className={`conf-digit${isWinner ? ' winner' : ''}`}>{i}</div>
                    <div className="conf-bar-bg">
                      <div
                        className={`conf-bar-fill${isWinner ? ' winner' : ''}`}
                        style={{ width: `${(c * 100).toFixed(1)}%` }}
                      />
                    </div>
                    <div className={`conf-pct${isWinner ? ' winner' : ''}`}>
                      {(c * 100).toFixed(1)}%
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      </div>

      {/* Log */}
      <div className="log-panel">
        <div className="log-header">
          <span style={{color:'var(--green)'}}>{t.termTitle}</span>
          <span>{t.termEntries(log.length)}</span>
        </div>
        <div className="log-body" ref={logBodyRef}>
          {log.map((entry, i) => (
            <div key={i} className="log-entry">
              <span className="log-time">[{entry.ts}]</span>
              <span className={`log-${entry.type}`}>{entry.msg}</span>
            </div>
          ))}
          <div><span style={{color:'var(--text-muted)'}}>$ </span><span className="cursor"/></div>
        </div>
      </div>

      {/* Tweaks toggle button */}
      {!tweaksOpen && (
        <button className="tweaks-btn" onClick={() => setTweaksOpen(true)}>⚙ tweaks</button>
      )}

      {/* Tweaks panel */}
      {tweaksOpen && (
        <div className="tweaks-panel">
          <div className="tweaks-title" style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
            <span>⚙ Tweaks</span>
            <span style={{cursor:'pointer', fontSize:'14px', color:'var(--text-muted)'}} onClick={() => setTweaksOpen(false)}>✕</span>
          </div>
          <div className="tweak-row">
            <span className="tweak-label">{t.tweakBrush}</span>
            <select className="tweak-select" value={tweaks.brushSize} onChange={e => setTweak('brushSize', e.target.value)}>
              <option value="small">{t.brushFine}</option>
              <option value="medium">{t.brushMed}</option>
              <option value="large">{t.brushThick}</option>
            </select>
          </div>
          <div className="tweak-row">
            <span className="tweak-label">{t.tweakPreview}</span>
            <div className={`toggle-switch${tweaks.showPreview28 ? ' on' : ''}`} onClick={() => setTweak('showPreview28', !tweaks.showPreview28)}>
              <div className="toggle-knob"/>
            </div>
          </div>
          <div className="tweak-row">
            <span className="tweak-label">{t.tweakSmooth}</span>
            <div className={`toggle-switch${tweaks.smoothing ? ' on' : ''}`} onClick={() => setTweak('smoothing', !tweaks.smoothing)}>
              <div className="toggle-knob"/>
            </div>
          </div>
          <div className="tweak-row">
            <span className="tweak-label">{t.tweakAuto}</span>
            <div className={`toggle-switch${tweaks.autoPredict ? ' on' : ''}`} onClick={() => setTweak('autoPredict', !tweaks.autoPredict)}>
              <div className="toggle-knob"/>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
